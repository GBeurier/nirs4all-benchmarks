name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = build only (no publish)"
        type: string
        default: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Smoke-check the wheel
        run: |
          python -m pip install dist/*.whl
          n4a-benchmarks --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.dry_run == 'false'
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Validate Trusted Publisher release tuple
        run: |
          set -euo pipefail
          expected_repo="GBeurier/nirs4all-benchmarks"
          if [[ "${GITHUB_REPOSITORY}" != "${expected_repo}" ]]; then
            echo "::error::PyPI Trusted Publisher for project nirs4all-benchmarks must target owner=GBeurier repo=nirs4all-benchmarks workflow=publish.yml environment=pypi; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi
          case "${GITHUB_WORKFLOW_REF}" in
            */.github/workflows/publish.yml@*)
              ;;
            *)
              echo "::error::Expected GITHUB_WORKFLOW_REF to point at .github/workflows/publish.yml, got ${GITHUB_WORKFLOW_REF}." >&2
              exit 1
              ;;
          esac
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
