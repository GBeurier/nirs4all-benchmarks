name: CI

on:
  push:
    branches: [main, rc/**]
  pull_request:
    branches: [main, rc/**]

jobs:
  green-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          uv pip install --python .venv -e ".[service,dev]" pytest-cov

      - name: Ruff (lint)
        run: .venv/bin/ruff check src tests

      - name: Mypy (types)
        run: .venv/bin/mypy

      - name: Pytest (with coverage)
        run: .venv/bin/pytest -q --cov=nirs4all_benchmarks --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check every SPA module
        run: |
          set -e
          for f in src/nirs4all_benchmarks/web/app.js \
                   src/nirs4all_benchmarks/web/lib/*.js \
                   src/nirs4all_benchmarks/web/views/*.js; do
            cp "$f" "${f%.js}.__check.mjs"
            node --check "${f%.js}.__check.mjs"
            rm "${f%.js}.__check.mjs"
            echo "ok: $f"
          done

  docker:
    runs-on: ubuntu-latest
    needs: green-gate
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nirs4all-benchmarks:ci .
      - name: Smoke test
        run: |
          docker run -d --name arena -p 8000:8000 nirs4all-benchmarks:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/api/healthz; then echo " up"; exit 0; fi
            sleep 1
          done
          docker logs arena; exit 1
