name: pages

# Build the static, client-side Arena (a JSON snapshot of the demo store + the
# no-build SPA) and deploy it to GitHub Pages at benchmarks.nirs4all.org.
# The published site needs NO backend — see DESIGN/ROADMAP (static now; a live
# server managing runs/pipelines/meta-analyses with nirs4all-repository &
# nirs4all-datasets is the medium-term plan).

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "pyproject.toml"
      - "VERSION"
      - "src/nirs4all_benchmarks/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv python install 3.11
      - name: Install
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv -e .
      - name: Seed demo store + build static site
        run: |
          .venv/bin/n4a-benchmarks fixtures --store ./pages-store
          .venv/bin/n4a-benchmarks build-site --store ./pages-store --out ./site --domain benchmarks.nirs4all.org
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
