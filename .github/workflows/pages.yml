name: pages

# Build the static, client-side Arena (a JSON snapshot of the demo store + the
# no-build SPA) and deploy it to GitHub Pages at benchmarks.nirs4all.org.
# The published site needs NO backend — see DESIGN/ROADMAP (static now; a live
# server managing runs/pipelines/meta-analyses with nirs4all-repository &
# nirs4all-datasets is the medium-term plan).

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "pyproject.toml"
      - "VERSION"
      - "src/nirs4all_benchmarks/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.11
      - name: Install
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv -e .
      - name: Seed demo store + build static site
        run: |
          .venv/bin/n4a-benchmarks fixtures --store ./pages-store
          .venv/bin/n4a-benchmarks build-site --store ./pages-store --out ./site --domain benchmarks.nirs4all.org
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
